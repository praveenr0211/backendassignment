services:
  - type: web
    name: task-management-app
    env: python
    region: oregon
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt && cd ../frontend && npm install && npm run build && cd ..
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 backend.app.main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: task_manager_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://task-management-app.onrender.com,https://www.task-management-app.onrender.com"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

databases:
  - name: task_manager_db
    databaseName: task_manager
    plan: free
